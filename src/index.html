<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="192x192">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO primario -->
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}" />
  <meta name="keywords" content="{{META_KEYWORDS}}" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Aion Studio" />

  <!-- Canonical & hreflang -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  <link rel="canonical" href="{{CANONICAL_URL}}" />
  <link rel="alternate" hreflang="es" href="https://aionstudio.tech/" />
  <link rel="alternate" hreflang="fr" href="https://aionstudio.tech/fr/" />
  <link rel="alternate" hreflang="en" href="https://aionstudio.tech/en/" />
  <link rel="alternate" hreflang="x-default" href="https://aionstudio.tech/" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{META_TITLE}}" />
  <meta property="og:description" content="{{META_DESCRIPTION}}" />
  <meta property="og:url" content="{{CANONICAL_URL}}" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://aionstudio.tech/assets/img/og-image.jpg" />
  <meta property="og:site_name" content="Aion Studio" />
  <meta property="og:locale" content="{{OG_LOCALE}}" />
  {{OG_LOCALE_ALTERNATES}}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{META_TITLE}}" />
  <meta name="twitter:description" content="{{META_DESCRIPTION}}" />
  <meta name="twitter:image" content="https://aionstudio.tech/assets/img/og-image.jpg" />

  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "Aion Studio",
    "description": "{{SCHEMA_DESCRIPTION}}",
    "url": "{{CANONICAL_URL}}",
    "email": "diego@aionstudio.tech",
    "logo": "https://aionstudio.tech/favicon.png",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Pennautier",
      "addressRegion": "Occitanie",
      "addressCountry": "FR"
    },
    "founder": {
      "@type": "Person",
      "name": "Diego Camiña Alonso"
    },
    "foundingDate": "2025",
    "serviceType": [
      "Inteligencia Artificial",
      "Automatización",
      "Agente de Voz IA",
      "Automatización de Emails",
      "Desarrollo Web con IA"
    ],
    "areaServed": ["España", "Francia"]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />

</head>

        <span class="logo-text">AionStudio</span>
      </a>
      <ul class="nav-links">
        <li><a href="#servicios" data-i18n="nav_services"></a></li>
        <li><a href="#mision" data-i18n="nav_mission"></a></li>
