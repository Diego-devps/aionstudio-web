<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="192x192">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}" />
  <meta name="keywords" content="{{META_KEYWORDS}}" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Aion Studio" />

  <link rel="canonical" href="{{CANONICAL_URL}}" />
  <link rel="alternate" hreflang="es" href="https://aionstudio.tech/auditoria/" />
  <link rel="alternate" hreflang="fr" href="https://aionstudio.tech/fr/auditoria/" />
  <link rel="alternate" hreflang="en" href="https://aionstudio.tech/en/auditoria/" />
  <link rel="alternate" hreflang="x-default" href="https://aionstudio.tech/auditoria/" />

  <meta property="og:title" content="{{META_TITLE}}" />
  <meta property="og:description" content="{{META_DESCRIPTION}}" />
  <meta property="og:url" content="{{CANONICAL_URL}}" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://aionstudio.tech/assets/img/og-image-v2.jpg" />
  <meta property="og:image:secure_url" content="https://aionstudio.tech/assets/img/og-image-v2.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Aion Studio — Agencia de IA para pymes" />
  <meta property="og:site_name" content="Aion Studio" />
  <meta property="og:locale" content="{{OG_LOCALE}}" />
  {{OG_LOCALE_ALTERNATES}}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="page-auditoria">

  <!-- NAV -->
  <nav id="navbar" class="navbar">
    <div class="nav-inner container">
      <a href="{{HOME_URL}}" class="nav-logo" aria-label="Aion Studio">
        <span class="logo-mark"><svg viewBox="0 0 44 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 22 L9 4 L16 22 M5 16 L13 16"/><path d="M16 22 L22 14" stroke-width="1" opacity="0.45"/><path d="M42 8 Q42 4 38 4 L30 4 Q26 4 26 8 Q26 12 30 12 L38 12 Q42 12 42 16 Q42 20 38 20 L30 20 Q26 20 26 16"/></svg></span>
        <span class="logo-text">AionStudio</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{HOME_URL}}#servicios" data-i18n="nav_services"></a></li>
        <li><a href="{{HOME_URL}}#mision" data-i18n="nav_mission"></a></li>
        <li><a href="{{BLOG_URL}}" data-i18n="nav_blog"></a></li>
      </ul>
      <div class="nav-right">
        <div class="lang-selector">
          {{LANG_TOGGLE}}
        </div>
        <a href="{{HOME_URL}}" class="btn btn-outline btn-sm"><span class="btn-label" data-i18n="aud_back_home"></span>
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          </span>
        </a>
      </div>
      <button class="nav-toggle" aria-label="{{NAV_MENU_OPEN}}" data-i18n-attr-aria-label-open="nav_menu_open" data-i18n-attr-aria-label-close="nav_menu_close">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- HEADER -->
  <section class="aud-header">
    <div class="container">
      <div class="aud-header-inner">
        <div>
          <div class="aud-badge" data-i18n="nx_aud_eyebrow"></div>
          <h1 class="aud-title">
            <span data-i18n="nx_aud_title_lead"></span>
            <em class="italic" data-i18n="nx_aud_title_italic"></em>
          </h1>
        </div>
        <p class="aud-subtitle" data-i18n="aud_subtitle"></p>
      </div>
    </div>
  </section>

  <!-- FORMULARIO + SIDEBAR -->
  <section class="aud-section">
    <div class="container aud-grid">

      <form id="aud-form" class="aud-form" novalidate
            data-i18n-success-title="aud_success_title"
            data-i18n-success-desc="aud_success_desc"
            data-i18n-error-required="aud_error_required"
            data-i18n-error-email="aud_error_email"
            data-i18n-error-server="aud_error_server"
            data-i18n-submitting="aud_submitting">

        <input type="hidden" name="lang" value="{{LANG}}" />
        <input type="text" name="website" tabindex="-1" autocomplete="off" class="aud-honeypot" aria-hidden="true" />

        <fieldset class="aud-block">
          <legend class="aud-block-title" data-i18n="aud_q1_title"></legend>
          <div class="form-row">
            <div class="form-group">
              <label for="q1_nombre"><span data-i18n="aud_q1_name_label"></span> <span class="form-required">*</span></label>
              <input type="text" id="q1_nombre" name="q1_nombre" required data-i18n-placeholder="aud_q1_name_ph" />
            </div>
            <div class="form-group">
              <label for="q1_empresa"><span data-i18n="aud_q1_company_label"></span> <span class="form-required">*</span></label>
              <input type="text" id="q1_empresa" name="q1_empresa" required data-i18n-placeholder="aud_q1_company_ph" />
            </div>
          </div>
          <div class="form-group">
            <label for="q1_cargo"><span data-i18n="aud_q1_role_label"></span> <span class="form-required">*</span></label>
            <input type="text" id="q1_cargo" name="q1_cargo" required data-i18n-placeholder="aud_q1_role_ph" />
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <legend class="aud-block-title" data-i18n="aud_q2_title"></legend>
          <div class="form-row">
            <div class="form-group">
              <label for="q2_email"><span data-i18n="aud_q2_email_label"></span> <span class="form-required">*</span></label>
              <input type="email" id="q2_email" name="q2_email" required data-i18n-placeholder="aud_q2_email_ph" />
            </div>
            <div class="form-group">
              <label for="q2_telefono" data-i18n="aud_q2_phone_label"></label>
              <input type="tel" id="q2_telefono" name="q2_telefono" data-i18n-placeholder="aud_q2_phone_ph" />
            </div>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <div class="form-group">
            <label for="q3_sector"><span data-i18n="aud_q3_label"></span> <span class="form-required">*</span></label>
            <select id="q3_sector" name="q3_sector" required>
              <option value="" data-i18n="aud_q3_select_ph"></option>
              <option value="dental" data-i18n="aud_q3_opt_dental"></option>
              <option value="accounting" data-i18n="aud_q3_opt_accounting"></option>
              <option value="beauty" data-i18n="aud_q3_opt_beauty"></option>
              <option value="realestate" data-i18n="aud_q3_opt_realestate"></option>
              <option value="hotel" data-i18n="aud_q3_opt_hotel"></option>
              <option value="vet" data-i18n="aud_q3_opt_vet"></option>
              <option value="other" data-i18n="aud_q3_opt_other"></option>
            </select>
          </div>
          <div class="form-group aud-conditional" id="q3_other_wrap" hidden>
            <label for="q3_sector_otro"><span data-i18n="aud_q3_other_label"></span> <span class="form-required">*</span></label>
            <input type="text" id="q3_sector_otro" name="q3_sector_otro" data-i18n-placeholder="aud_q3_other_ph" />
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <legend class="aud-block-title"><span data-i18n="aud_q4_label"></span> <span class="form-required">*</span></legend>
          <div class="aud-radio-grid">
            <label class="aud-radio"><input type="radio" name="q4_empleados" value="1" required /><span data-i18n="aud_q4_opt_1"></span></label>
            <label class="aud-radio"><input type="radio" name="q4_empleados" value="2-5" /><span data-i18n="aud_q4_opt_2_5"></span></label>
            <label class="aud-radio"><input type="radio" name="q4_empleados" value="6-15" /><span data-i18n="aud_q4_opt_6_15"></span></label>
            <label class="aud-radio"><input type="radio" name="q4_empleados" value="16-30" /><span data-i18n="aud_q4_opt_16_30"></span></label>
            <label class="aud-radio"><input type="radio" name="q4_empleados" value="30+" /><span data-i18n="aud_q4_opt_30plus"></span></label>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <legend class="aud-block-title"><span data-i18n="aud_q5_label"></span> <span class="form-required">*</span></legend>
          <div class="aud-radio-grid">
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value="<80K" required /><span data-i18n="aud_q5_opt_lt80"></span></label>
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value="80-150K" /><span data-i18n="aud_q5_opt_80_150"></span></label>
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value="150-350K" /><span data-i18n="aud_q5_opt_150_350"></span></label>
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value="350K-1M" /><span data-i18n="aud_q5_opt_350_1m"></span></label>
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value=">1M" /><span data-i18n="aud_q5_opt_1m_plus"></span></label>
            <label class="aud-radio"><input type="radio" name="q5_facturacion" value="prefer-not" /><span data-i18n="aud_q5_opt_no"></span></label>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <legend class="aud-block-title"><span data-i18n="aud_q6_label"></span> <span class="form-required">*</span></legend>
          <div class="aud-radio-grid">
            <label class="aud-radio"><input type="radio" name="q6_decisor" value="yes" required /><span data-i18n="aud_q6_opt_yes"></span></label>
            <label class="aud-radio"><input type="radio" name="q6_decisor" value="partner" /><span data-i18n="aud_q6_opt_partner"></span></label>
            <label class="aud-radio"><input type="radio" name="q6_decisor" value="committee" /><span data-i18n="aud_q6_opt_committee"></span></label>
            <label class="aud-radio"><input type="radio" name="q6_decisor" value="other" /><span data-i18n="aud_q6_opt_other"></span></label>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <div class="form-group">
            <label for="q7_dolor"><span data-i18n="aud_q7_label"></span> <span class="form-required">*</span></label>
            <p class="form-helper" data-i18n="aud_q7_helper"></p>
            <textarea id="q7_dolor" name="q7_dolor" rows="5" required data-i18n-placeholder="aud_q7_ph"></textarea>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <div class="form-group">
            <label for="q8_otros"><span data-i18n="aud_q8_label"></span></label>
            <p class="form-helper" data-i18n="aud_q8_helper"></p>
            <textarea id="q8_otros" name="q8_otros" rows="3" data-i18n-placeholder="aud_q8_ph"></textarea>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <div class="form-group">
            <label for="q9_stack"><span data-i18n="aud_q9_label"></span> <span class="form-required">*</span></label>
            <p class="form-helper" data-i18n="aud_q9_helper"></p>
            <textarea id="q9_stack" name="q9_stack" rows="3" required data-i18n-placeholder="aud_q9_ph"></textarea>
          </div>
        </fieldset>

        <fieldset class="aud-block">
          <legend class="aud-block-title"><span data-i18n="aud_q10_label"></span> <span class="form-required">*</span></legend>
          <div class="aud-radio-grid">
            <label class="aud-radio"><input type="radio" name="q10_urgencia" value="asap" required /><span data-i18n="aud_q10_opt_asap"></span></label>
            <label class="aud-radio"><input type="radio" name="q10_urgencia" value="1-3m" /><span data-i18n="aud_q10_opt_1_3"></span></label>
            <label class="aud-radio"><input type="radio" name="q10_urgencia" value="3-6m" /><span data-i18n="aud_q10_opt_3_6"></span></label>
            <label class="aud-radio"><input type="radio" name="q10_urgencia" value="exploring" /><span data-i18n="aud_q10_opt_explore"></span></label>
          </div>
        </fieldset>

        <div class="aud-submit-wrap">
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:space-between;"><span class="btn-label" data-i18n="aud_submit"></span>
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
            </span>
          </button>
          <p class="aud-legal-note" data-i18n="aud_legal_note"></p>
          <div id="aud-feedback" class="aud-feedback" aria-live="polite"></div>
        </div>
      </form>

      <aside class="aud-sidebar">
        <div class="aud-sidebar-card">
          <h3 class="aud-sidebar-title" data-i18n="aud_side_title"></h3>
          <p class="aud-sidebar-step" data-i18n="aud_side_step1"></p>
          <p class="aud-sidebar-step" data-i18n="aud_side_step2"></p>
          <p class="aud-sidebar-step" data-i18n="aud_side_step3"></p>
          <p class="aud-sidebar-footer" data-i18n="aud_side_footer"></p>
        </div>
      </aside>

    </div>
  </section>

  <!-- FOOTER mínimo -->
  <footer class="footer footer-minimal">
    <div class="container">
      <div class="footer-bottom">
        <p class="footer-copy">© <span id="year"></span> Aion Studio · <span data-i18n="footer_rights"></span></p>
        <div class="footer-legal-links">
          {{LEGAL_LINKS}}
        </div>
      </div>
    </div>
  </footer>

  <!-- WhatsApp flotante (W18) — href por idioma inyectado por el build -->
  <a class="wa-float" href="{{WHATSAPP_HREF}}" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.207zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.71.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
  </a>

  <script src="/js/main.js"></script>
</body>
</html>
